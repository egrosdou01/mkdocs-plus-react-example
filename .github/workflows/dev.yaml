name: CI build dev docu
on:
  push:
    branches:
    - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/configure-pages@v5
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v5
      with:
        python-version: 3.x
        cache: 'pip'
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: docs/test/package-lock.json
    - run: pip install zensical==0.0.32
    - name: Build React website
      working-directory: docs/test
      run: |
        npm ci
        npm run build
    - run: zensical build --clean
    - name: Combine pages
      run: |
        mkdir -p deploy
        cp -r docs/test/out/* deploy/
        mkdir -p deploy/docs
        cp -r site/* deploy/docs/
    - uses: actions/upload-pages-artifact@v4
      with:
        path: deploy
    - uses: actions/deploy-pages@v4
      id: deployment
